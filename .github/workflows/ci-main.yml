name: Main Branch Checks

on:
  push:
    branches:
      - main

jobs:
  validate:
    name: Prettier + Skill Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bin/package-lock.json

      - name: Install dependencies
        run: npm --prefix bin ci

      - name: Prettier check
        run: npm --prefix bin run format:check

      - name: Validate generated skills
        run: npm --prefix bin run validate
